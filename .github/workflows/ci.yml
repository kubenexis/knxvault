#
# CI/CD: quality gate → host binaries → multi-platform knxvault-cli packages →
# validated container builds → GHCR. On v* tags, publish knxvault-cli release assets.
#
# Images: ghcr.io/<owner>/knxvault and ghcr.io/<owner>/knxvault-operator
# knxvault-cli is a SEPARATE admin package (never in container images):
#   - Workflow artifacts every run (linux amd64 host build + multi-platform archives)
#   - GitHub Release assets on tag v* (tar.gz/zip + SHA256SUMS)
#
# Push images to GHCR when: push to main, tag v*, or workflow_dispatch on main/tag.
# Pull requests run quality + image build/scan but do not push images or create releases.

name: CI

"on":
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_TOOLCHAIN: go1.26.5
  # Default semver when not building from a v* tag (keep in sync with Makefile VERSION).
  DEFAULT_VERSION: "0.5.1"

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Quality gate (same stages as `make quality` + integration + host binaries)
  # ---------------------------------------------------------------------------
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      version: ${{ steps.meta.outputs.version }}
      commit: ${{ steps.meta.outputs.commit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          COMMIT="$(git rev-parse --short HEAD)"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${DEFAULT_VERSION}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "commit=${COMMIT}" >> "${GITHUB_OUTPUT}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          check-latest: false
          cache: true

      - name: Install lint / security tools
        run: make install-tools

      # Pin setup-trivy to a post-incident release (see Aqua GHSA-69fq-xp46-6x23).
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.69.3
          cache: true

      - name: Quality gate (fmt vet lint docs licenses gosec scan test coverage)
        run: make quality

      - name: Integration tests + host binaries + SBOM
        run: |
          make test-integration
          make build build-cli VERSION="${{ steps.meta.outputs.version }}" COMMIT="${{ steps.meta.outputs.commit }}"
          test -x build/bin/knxvault
          test -x build/bin/knxvault-cli
          # Smoke-check both host binaries report build metadata.
          build/bin/knxvault -v
          build/bin/knxvault-cli -v
          make sbom

      - name: Upload host server binary (linux/amd64)
        uses: actions/upload-artifact@v4
        with:
          name: knxvault-server-linux-amd64-${{ github.sha }}
          path: build/bin/knxvault
          if-no-files-found: error
          retention-days: 30

      # Dedicated CLI artifact (separate package from server) for every CI run.
      - name: Upload knxvault-cli host binary (linux/amd64)
        uses: actions/upload-artifact@v4
        with:
          name: knxvault-cli-linux-amd64-${{ github.sha }}
          path: build/bin/knxvault-cli
          if-no-files-found: error
          retention-days: 30

      - name: Upload combined host binaries (compat)
        uses: actions/upload-artifact@v4
        with:
          name: knxvault-binaries-linux-amd64-${{ github.sha }}
          path: |
            build/bin/knxvault
            build/bin/knxvault-cli
          if-no-files-found: error
          retention-days: 30

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            build/sbom.json
            build/sbom-binary.json
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------------------
  # knxvault-cli multi-platform release package (separate from container images)
  # ---------------------------------------------------------------------------
  cli-package:
    name: knxvault-cli package
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # required to attach assets on GitHub Releases (tag builds)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          check-latest: false
          cache: true

      - name: Build multi-platform knxvault-cli packages
        env:
          VERSION: ${{ needs.quality.outputs.version }}
          COMMIT: ${{ needs.quality.outputs.commit }}
          BUILD_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          make package-cli-release VERSION="${VERSION}" COMMIT="${COMMIT}" BUILD_ID="${BUILD_ID}"
          test -f build/release/cli/SHA256SUMS
          ls -la build/release/cli/
          # Sanity: at least linux/amd64 archive exists
          test -f "build/release/cli/knxvault-cli_${VERSION}_linux_amd64.tar.gz"

      - name: Upload knxvault-cli multi-platform packages (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: knxvault-cli-packages-${{ needs.quality.outputs.version }}-${{ needs.quality.outputs.commit }}
          path: build/release/cli/
          if-no-files-found: error
          retention-days: 90

      - name: Publish knxvault-cli to GitHub Release (tag v* only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release/cli/knxvault-cli_*.tar.gz
            build/release/cli/knxvault-cli_*.zip
            build/release/cli/SHA256SUMS
            build/release/cli/build-info.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## knxvault-cli (admin host package)

            Download platform archives below. **CLI is not a container image** and is never baked into `ghcr.io/.../knxvault`.

            | Package | Platform |
            |---------|----------|
            | `knxvault-cli_*_linux_amd64.tar.gz` | Linux x86_64 |
            | `knxvault-cli_*_linux_arm64.tar.gz` | Linux aarch64 |
            | `knxvault-cli_*_darwin_amd64.tar.gz` | macOS Intel |
            | `knxvault-cli_*_darwin_arm64.tar.gz` | macOS Apple Silicon |
            | `knxvault-cli_*_windows_amd64.zip` | Windows x86_64 |

            Verify: `sha256sum -c SHA256SUMS`

            Server/operator container images are published separately to GHCR (`knxvault`, `knxvault-operator`).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        shell: bash
        run: |
          {
            echo "## knxvault-cli package"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | \`${{ needs.quality.outputs.version }}\` |"
            echo "| Commit | \`${{ needs.quality.outputs.commit }}\` |"
            echo "| Workflow artifact | \`knxvault-cli-packages-${{ needs.quality.outputs.version }}-${{ needs.quality.outputs.commit }}\` |"
            echo "| GitHub Release assets | \`${{ startsWith(github.ref, 'refs/tags/v') && 'yes (tag)' || 'no (branch/PR)' }}\` |"
            echo ""
            echo "### Archives"
            echo '```'
            ls -1 build/release/cli/ || true
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

  # ---------------------------------------------------------------------------
  # Container images: build → scan → push to GHCR (validated)
  # ---------------------------------------------------------------------------
  images:
    name: Images (${{ matrix.image_name }})
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      # SLSA provenance / SBOM attestations attached to the GHCR image
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: knxvault
            dockerfile: Dockerfile
            description: KNXVault server (serve + CSI/webhook/ESO binaries; CLI is a separate host artifact)
          - image_name: knxvault-operator
            dockerfile: Dockerfile.operator
            description: KNXVault Kubernetes certificate operator
    env:
      # GHCR requires lowercase path segments
      IMAGE_ORG: ${{ github.repository_owner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version, commit, and image refs
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          ORG="$(echo "${IMAGE_ORG}" | tr '[:upper:]' '[:lower:]')"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_ID="${GITHUB_RUN_ID}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${DEFAULT_VERSION}"
          fi

          IMAGE_TAG="${VERSION}-${COMMIT}"
          REPO="ghcr.io/${ORG}/${{ matrix.image_name }}"

          # Tags always include unique commit identity.
          TAGS="${REPO}:${IMAGE_TAG}"
          # Floating semver alias (manifests pin this).
          TAGS="${TAGS},${REPO}:${VERSION}"
          # short SHA convenience tag
          TAGS="${TAGS},${REPO}:sha-${COMMIT}"

          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            TAGS="${TAGS},${REPO}:main"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAGS="${TAGS},${REPO}:latest"
          fi

          PUSH=false
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${GITHUB_REF}" == refs/heads/main || "${GITHUB_REF}" == refs/tags/v* ]]; then
              PUSH=true
            fi
          fi

          {
            echo "org=${ORG}"
            echo "version=${VERSION}"
            echo "commit=${COMMIT}"
            echo "build_id=${BUILD_ID}"
            echo "image_tag=${IMAGE_TAG}"
            echo "repository=${REPO}"
            echo "tags=${TAGS}"
            echo "push=${PUSH}"
          } >> "${GITHUB_OUTPUT}"

          echo "Repository: ${REPO}"
          echo "Tags:       ${TAGS}"
          echo "Push:       ${PUSH}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.meta.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load locally for validation)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_ID=${{ steps.meta.outputs.build_id }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image_name }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=Kubenexis Systems Private Limited
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

      # Pin trivy-action to a post-incident release (v0.35.0+); avoid floating tags.
      - name: Trivy image scan (HIGH/CRITICAL gate)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.meta.outputs.repository }}:${{ steps.meta.outputs.image_tag }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table
          scanners: vuln
          version: v0.69.3

      - name: Push validated image to GHCR
        if: steps.meta.outputs.push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_ID=${{ steps.meta.outputs.build_id }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image_name }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=Kubenexis Systems Private Limited
          cache-from: type=gha,scope=${{ matrix.image_name }}
          provenance: mode=max
          sbom: true

      - name: Summary
        shell: bash
        run: |
          {
            echo "## ${{ matrix.image_name }}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Repository | \`${{ steps.meta.outputs.repository }}\` |"
            echo "| Image tag | \`${{ steps.meta.outputs.image_tag }}\` |"
            echo "| Tags | \`${{ steps.meta.outputs.tags }}\` |"
            echo "| Pushed | \`${{ steps.meta.outputs.push }}\` |"
            echo "| Digest (build) | \`${{ steps.build.outputs.digest }}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"
