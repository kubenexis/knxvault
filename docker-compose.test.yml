# Optional PostgreSQL for integration tests (W11-01)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: knxvault
      POSTGRES_PASSWORD: knxvault
      POSTGRES_DB: knxvault
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knxvault"]
      interval: 2s
      timeout: 3s
      retries: 10