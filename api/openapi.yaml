openapi: 3.1.0
info:
  title: KNXVault API
  version: 0.4.6
  description: Secrets management and PKI REST API (Phase 1 MVP + Phase 2 complete).
servers:
  - url: http://localhost:8200
    description: Local development
tags:
  - name: sys
    description: System health, capabilities, RBAC policies, and roles
  - name: auth
    description: Authentication
  - name: pki
    description: Public Key Infrastructure
  - name: secrets
    description: KV and dynamic secrets engines
  - name: audit
    description: Audit export and verification
  - name: inject
    description: Secrets injection for sidecars and init containers
paths:
  /health:
    get:
      tags: [sys]
      summary: Liveness probe
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /ready:
    get:
      tags: [sys]
      summary: Readiness probe
      operationId: getReady
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service is not ready
  /metrics:
    get:
      tags: [sys]
      summary: Prometheus metrics
      operationId: getMetrics
      responses:
        "200":
          description: Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string
  /openapi.yaml:
    get:
      tags: [sys]
      summary: OpenAPI specification
      operationId: getOpenAPI
      responses:
        "200":
          description: OpenAPI YAML document
  /swagger:
    get:
      tags: [sys]
      summary: Swagger UI
      operationId: getSwaggerUI
      responses:
        "200":
          description: Swagger UI HTML page
  /sys/capabilities:
    get:
      tags: [sys]
      summary: Token capabilities
      operationId: getCapabilities
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Allowed capabilities for the current token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilitiesResponse"
  /sys/rotate-master-key:
    post:
      tags: [sys]
      summary: Rotate envelope master key
      operationId: rotateMasterKey
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotateMasterKeyRequest"
      responses:
        "200":
          description: Master key rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateMasterKeyResponse"
  /sys/seal:
    post:
      tags: [sys]
      summary: Seal vault (block mutating operations)
      operationId: sealVault
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Vault sealed
  /sys/unseal:
    post:
      tags: [sys]
      summary: Unseal vault
      operationId: unsealVault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnsealRequest"
      responses:
        "200":
          description: Vault unsealed
  /sys/raft/add-node:
    post:
      tags: [sys]
      summary: Add Raft cluster member
      operationId: raftAddNode
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RaftAddNodeRequest"
      responses:
        "200":
          description: Node added
  /sys/raft/remove-node:
    post:
      tags: [sys]
      summary: Remove Raft cluster member
      operationId: raftRemoveNode
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RaftRemoveNodeRequest"
      responses:
        "200":
          description: Node removed
  /auth/kubernetes:
    post:
      tags: [auth]
      summary: Kubernetes service account login
      operationId: loginKubernetes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/K8sLoginRequest"
      responses:
        "200":
          description: Client token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /auth/token:
    post:
      tags: [auth]
      summary: Validate an existing client token
      operationId: loginToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenLoginRequest"
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /auth/agent/delegate:
    post:
      tags: [auth]
      summary: Delegate a scoped AI agent token from the caller
      operationId: delegateAgent
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentDelegateRequest"
      responses:
        "200":
          description: Agent token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /pki/root:
    post:
      tags: [pki]
      summary: Create a root CA
      operationId: createRootCA
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRootCARequest"
      responses:
        "201":
          description: Root CA created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CAResponse"
  /pki/intermediate:
    post:
      tags: [pki]
      summary: Create an intermediate CA
      operationId: createIntermediateCA
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntermediateCARequest"
      responses:
        "201":
          description: Intermediate CA created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CAResponse"
  /pki/issue-client-cert:
    post:
      tags: [pki]
      summary: Issue a client certificate for API mTLS consumers
      operationId: issueClientCertificate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueClientCertRequest"
      responses:
        "201":
          description: Client certificate issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueClientCertResponse"
  /pki/issue:
    post:
      tags: [pki]
      summary: Issue a leaf certificate
      operationId: issueCertificate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueCertRequest"
      responses:
        "201":
          description: Certificate issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueCertResponse"
  /pki/ca/{id}:
    get:
      tags: [pki]
      summary: Get CA by ID
      operationId: getCA
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: CA details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CAResponse"
  /pki/revoke:
    post:
      tags: [pki]
      summary: Revoke a certificate serial
      operationId: revokeCertificate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeCertRequest"
      responses:
        "204":
          description: Certificate revoked
  /pki/crl/{id}:
    get:
      tags: [pki]
      summary: Generate CRL for a CA
      operationId: getCRL
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: PEM CRL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CRLResponse"
  /pki/renew:
    post:
      tags: [pki]
      summary: Renew a leaf certificate
      operationId: renewCertificate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenewCertRequest"
      responses:
        "200":
          description: Certificate renewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenewCertResponse"
  /pki/ocsp/{id}:
    post:
      tags: [pki]
      summary: OCSP responder (DER request/response)
      operationId: handleOCSP
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/ocsp-request:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: OCSP response
          content:
            application/ocsp-response:
              schema:
                type: string
                format: binary
  /inject/render:
    post:
      tags: [inject]
      summary: Render secrets for sidecar or init-container injection
      operationId: injectRender
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InjectRenderRequest"
      responses:
        "200":
          description: Materialized secret payloads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InjectRenderResponse"
  /inject/csi/mount-audit:
    post:
      tags: [inject]
      summary: Record a successful CSI provider mount (pod identity audit)
      operationId: recordCSIMount
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CSIMountAuditRequest"
      responses:
        "204": { description: Audit recorded }
  /secrets/kv/{path}:
    post:
      tags: [secrets]
      summary: Write a KV secret version
      operationId: writeSecret
      security:
        - bearerAuth: []
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KVWriteRequest"
      responses:
        "200":
          description: Secret written
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KVWriteResponse"
    get:
      tags: [secrets]
      summary: Read latest KV secret version
      operationId: readSecret
      security:
        - bearerAuth: []
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Secret payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KVReadResponse"
    delete:
      tags: [secrets]
      summary: Delete a KV secret path
      operationId: deleteSecret
      security:
        - bearerAuth: []
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Secret deleted
  /secrets/database/roles/{name}:
    put:
      tags: [secrets]
      summary: Configure database credential role
      operationId: putDatabaseRole
      security: [{ bearerAuth: [] }]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatabaseRoleRequest"
      responses:
        "204": { description: Role saved }
    get:
      tags: [secrets]
      summary: Get database credential role
      operationId: getDatabaseRole
      security: [{ bearerAuth: [] }]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Role configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseRoleResponse"
  /secrets/database/creds/{role}:
    post:
      tags: [secrets]
      summary: Generate ephemeral database credentials
      operationId: generateDatabaseCreds
      security: [{ bearerAuth: [] }]
      parameters:
        - name: role
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatabaseCredsRequest"
      responses:
        "200":
          description: Generated credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseCredsResponse"
  /secrets/database/renew/{lease_id}:
    post:
      tags: [secrets]
      summary: Renew database credential lease
      operationId: renewDatabaseLease
      security: [{ bearerAuth: [] }]
      parameters:
        - name: lease_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatabaseRenewRequest"
      responses:
        "200":
          description: Renewed credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseCredsResponse"
  /secrets/database/revoke/{lease_id}:
    put:
      tags: [secrets]
      summary: Revoke database credential lease
      operationId: revokeDatabaseLease
      security: [{ bearerAuth: [] }]
      parameters:
        - name: lease_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Lease revoked }
  /sys/leases:
    get:
      tags: [sys]
      summary: List leases with optional filters
      operationId: listLeases
      security: [{ bearerAuth: [] }]
      parameters:
        - name: engine
          in: query
          schema: { type: string }
        - name: role
          in: query
          schema: { type: string }
        - name: prefix
          in: query
          schema: { type: string }
        - name: active_only
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Lease list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaseListResponse"
  /sys/leases/{lease_id}:
    get:
      tags: [sys]
      summary: Lookup lease metadata
      operationId: getLease
      security: [{ bearerAuth: [] }]
      parameters:
        - name: lease_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Lease metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaseView"
  /sys/leases/revoke:
    put:
      tags: [sys]
      summary: Bulk revoke leases by engine/role/prefix
      operationId: bulkRevokeLeases
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkRevokeLeasesRequest"
      responses:
        "200":
          description: Revocation summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRevokeLeasesResponse"
  /sys/auth/lockout:
    delete:
      tags: [sys]
      summary: Clear login lockout for an identity (break-glass)
      operationId: clearAuthLockout
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LockoutClearRequest"
      responses:
        "204":
          description: Lockout cleared
  /sys/policy/simulate:
    post:
      tags: [sys]
      summary: Simulate policy authorization for a resource
      operationId: simulatePolicy
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicySimulateRequest"
      responses:
        "200":
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicySimulateResponse"
  /sys/audit/pack:
    get:
      tags: [sys]
      summary: Export compliance audit pack (ZIP)
      operationId: exportAuditPack
      security: [{ bearerAuth: [] }]
      parameters:
        - name: since
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Audit pack ZIP archive
          content:
            application/zip:
              schema:
                type: string
                format: binary
  /sys/policies:
    get:
      tags: [sys]
      summary: List RBAC policies
      operationId: listPolicies
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Policy list }
  /sys/policies/{name}:
    put:
      tags: [sys]
      summary: Create or update RBAC policy
      operationId: putPolicy
      security: [{ bearerAuth: [] }]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyRequest"
      responses:
        "204": { description: Policy saved }
    get:
      tags: [sys]
      summary: Get RBAC policy
      operationId: getPolicy
      security: [{ bearerAuth: [] }]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"
    delete:
      tags: [sys]
      summary: Delete RBAC policy
      operationId: deletePolicy
      security: [{ bearerAuth: [] }]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Policy deleted }
  /sys/roles:
    get:
      tags: [sys]
      summary: List role bindings
      operationId: listRoles
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items:
                      $ref: "#/components/schemas/RoleResponse"
  /sys/roles/{name}:
    put:
      tags: [sys]
      summary: Create or update role binding
      operationId: putRole
      security: [{ bearerAuth: [] }]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleRequest"
      responses:
        "204": { description: Role saved }
    get:
      tags: [sys]
      summary: Get role binding
      operationId: getRole
      security: [{ bearerAuth: [] }]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleResponse"
    delete:
      tags: [sys]
      summary: Delete role binding
      operationId: deleteRole
      security: [{ bearerAuth: [] }]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Role deleted }
  /sys/backup:
    post:
      tags: [sys]
      summary: Export encrypted vault snapshot
      operationId: createBackup
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupCreateRequest"
      responses:
        "200":
          description: Encrypted backup archive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupCreateResponse"
  /sys/restore:
    post:
      tags: [sys]
      summary: Restore vault state from encrypted snapshot
      operationId: restoreBackup
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
              format: binary
      responses:
        "204":
          description: Restore completed
  /audit/export:
    get:
      tags: [audit]
      summary: Export audit log with signed chain head
      operationId: exportAudit
      security: [{ bearerAuth: [] }]
      parameters:
        - name: since
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer }
        - name: offset
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Audit export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditExportResponse"
  /audit/verify:
    post:
      tags: [audit]
      summary: Verify audit hash chain integrity
      operationId: verifyAudit
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuditVerifyRequest"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditVerifyResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
        version:
          type: string
        ha_enabled:
          type: boolean
        leader:
          type: boolean
        sealed:
          type: boolean
    ErrorResponse:
      type: object
      required: [error_code, message, request_id, timestamp]
      properties:
        error_code:
          type: string
        message:
          type: string
        details:
          type: object
        request_id:
          type: string
        timestamp:
          type: string
          format: date-time
    CapabilitiesResponse:
      type: object
      properties:
        capabilities:
          type: array
          items:
            type: string
    RotateMasterKeyRequest:
      type: object
      required: [new_key]
      properties:
        new_key:
          type: string
          description: Base64-encoded 32-byte master key
    RotateMasterKeyResponse:
      type: object
      properties:
        key_version:
          type: integer
    UnsealRequest:
      type: object
      required: [key]
      properties:
        key:
          type: string
          description: Base64-encoded unseal key
    RaftAddNodeRequest:
      type: object
      required: [node_id, address]
      properties:
        node_id:
          type: integer
          format: int64
        address:
          type: string
    RaftRemoveNodeRequest:
      type: object
      required: [node_id]
      properties:
        node_id:
          type: integer
          format: int64
    K8sLoginRequest:
      type: object
      required: [role, jwt]
      properties:
        role:
          type: string
        jwt:
          type: string
    TokenLoginRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    AgentDelegateRequest:
      type: object
      required: [agent_id, path_prefix, allowed_actions]
      properties:
        agent_id:
          type: string
        path_prefix:
          type: string
        allowed_actions:
          type: array
          items:
            type: string
        policies:
          type: array
          items:
            type: string
        ttl:
          type: string
    LoginResponse:
      type: object
      properties:
        client_token:
          type: string
        ttl:
          type: integer
        policies:
          type: array
          items:
            type: string
        renewable:
          type: boolean
    CreateRootCARequest:
      type: object
      required: [name, common_name, ttl]
      properties:
        name:
          type: string
        common_name:
          type: string
        ttl:
          type: string
        key_type:
          type: string
        key_bits:
          type: integer
    CreateIntermediateCARequest:
      type: object
      required: [parent_name, name, common_name, ttl]
      properties:
        parent_name:
          type: string
        name:
          type: string
        common_name:
          type: string
        ttl:
          type: string
        key_bits:
          type: integer
    IssueCertRequest:
      type: object
      required: [role, common_name]
      properties:
