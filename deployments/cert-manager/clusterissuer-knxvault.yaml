# cert-manager ClusterIssuer targeting KNXVault PKI via Vault API compatibility shim (W40-02).
# KNXVault exposes /v1/auth/kubernetes/login and /v1/pki/sign/:role for cert-manager.
# PKI setup (root/intermediate/leaf): docs/operations/pki-administration.md
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: knxvault-pki
spec:
  vault:
    server: https://knxvault.knxvault.svc.cluster.local:8200
    path: pki/sign/web-server
    auth:
      kubernetes:
        role: cert-manager
        mountPath: /v1/auth/kubernetes
        serviceAccountRef:
          name: cert-manager
          namespace: cert-manager