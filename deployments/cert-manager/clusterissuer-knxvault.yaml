# cert-manager ClusterIssuer targeting KNXVault PKI via Vault-compatible API shim (W40-02).
#
# KNXVault exposes /v1/pki/sign/:role and /v1/auth/kubernetes for cert-manager's Vault issuer.
# See docs/operations/pki-kubernetes.md for PKI bootstrap.
# PKI setup (root/intermediate/leaf): docs/operations/pki-administration.md
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: knxvault-pki
spec:
  vault:
    server: https://knxvault.knxvault.svc.cluster.local:8200
    path: pki/sign/web-server
    auth:
      kubernetes:
        role: cert-manager
        mountPath: /v1/auth/kubernetes
        serviceAccountRef:
          name: cert-manager
          namespace: cert-manager