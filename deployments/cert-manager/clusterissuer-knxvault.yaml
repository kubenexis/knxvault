# cert-manager ClusterIssuer targeting KNXVault PKI via Vault product profile (W40-02).
# KNXVault exposes GET /v1/sys/health, POST /v1/auth/kubernetes/login (or approle/token),
# and POST /v1/<mount>/sign/<role> for cert-manager's built-in Vault issuer.
# Recipe: docs/recipes/cert-manager-integration.md
# PKI setup: docs/operations/pki-administration.md
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: knxvault-pki
spec:
  vault:
    server: https://knxvault.knxvault.svc.cluster.local:8200
    path: pki/sign/web-server
    auth:
      kubernetes:
        role: cert-manager
        mountPath: /v1/auth/kubernetes
        serviceAccountRef:
          name: cert-manager
          namespace: cert-manager