apiVersion: v1
kind: ServiceAccount
metadata:
  name: knxvault-operator
  namespace: knxvault
---
# Cluster-scoped CRDs + leader election + optional namespaced Secret write.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: knxvault-operator
rules:
  - apiGroups: [knxvault.kubenexis.dev]
    resources:
      - knxvaultcas
      - knxvaultcas/status
      - knxvaultissuers
      - knxvaultissuers/status
      - knxvaultclusterissuers
      - knxvaultclusterissuers/status
      - knxvaultcertificates
      - knxvaultcertificates/status
      - knxvaultcertificaterequests
      - knxvaultcertificaterequests/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # W78-06 / W79-02: Secrets are NOT cluster-scoped (no get/list/watch/write).
  # Grant namespaced Secret access via Role/RoleBinding (this file + rbac-namespaced-example.yaml).
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  # W50-09: Gateway API shim (optional CRDs)
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: knxvault-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: knxvault-operator
subjects:
  - kind: ServiceAccount
    name: knxvault-operator
    namespace: knxvault
---
# Namespaced Secret write in the operator's own namespace (TLS Secrets for local CRs).
# W80-04: least privilege — get + create/update/patch only (no list/watch/delete).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: knxvault-operator-secrets
  namespace: knxvault
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: knxvault-operator-secrets
  namespace: knxvault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: knxvault-operator-secrets
subjects:
  - kind: ServiceAccount
    name: knxvault-operator
    namespace: knxvault
