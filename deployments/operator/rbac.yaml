apiVersion: v1
kind: ServiceAccount
metadata:
  name: knxvault-operator
  namespace: knxvault
---
# Cluster-scoped CRDs + leader election. Secrets are NEVER cluster-scoped.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: knxvault-operator
rules:
  - apiGroups: [knxvault.kubenexis.dev]
    resources:
      - knxvaultcas
      - knxvaultcas/status
      - knxvaultissuers
      - knxvaultissuers/status
      - knxvaultclusterissuers
      - knxvaultclusterissuers/status
      - knxvaultcertificates
      - knxvaultcertificates/status
      - knxvaultcertificaterequests
      - knxvaultcertificaterequests/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # W78-06 / W79-02 / W86-01: Secrets are NOT cluster-scoped (no get/list/watch/write).
  # Grant namespaced Secret access via Role/RoleBinding for app namespaces only
  # (rbac-namespaced-example.yaml). The vault custody Secret (name: knxvault) lives
  # in this namespace and must NOT be get-able by the operator SA.
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  # W50-09: Gateway API shim (optional CRDs)
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: knxvault-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: knxvault-operator
subjects:
  - kind: ServiceAccount
    name: knxvault-operator
    namespace: knxvault
---
# W86-01: Namespaced Secret write in the operator's own namespace for TLS Secrets only.
# Do NOT grant get/list/watch on all Secrets (would expose master/unseal/root Secret "knxvault").
# create/update/patch without blanket get: operator still creates TLS Secrets; ownership
# checks use get only when Certificate.secretName is not the custody secret name.
# For app-namespace TLS delivery, apply rbac-namespaced-example.yaml (recommended).
# Optional ACME account Secrets: grant get via resourceNames for known ACME account names only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: knxvault-operator-secrets
  namespace: knxvault
rules:
  # Write TLS / ACME Secrets without reading custody material.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch"]
  # Explicit get for non-custody Secrets only (resourceNames). Custody Secret "knxvault" is omitted.
  # Operators may extend resourceNames for Certificate secretNames they manage in this NS.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames:
      - knxvault-tls-example
      - acme-account
      - acme-account-key
      - letsencrypt-account
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: knxvault-operator-secrets
  namespace: knxvault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: knxvault-operator-secrets
subjects:
  - kind: ServiceAccount
    name: knxvault-operator
    namespace: knxvault
