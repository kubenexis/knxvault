apiVersion: v1
kind: ServiceAccount
metadata:
  name: knxvault-operator
  namespace: knxvault
---
# Cluster-scoped CRDs only. Secrets and leader leases are namespaced (W86-01 write isolation, W86-19).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: knxvault-operator
rules:
  - apiGroups: [knxvault.kubenexis.dev]
    resources:
      - knxvaultcas
      - knxvaultcas/status
      - knxvaultissuers
      - knxvaultissuers/status
      - knxvaultclusterissuers
      - knxvaultclusterissuers/status
      - knxvaultcertificates
      - knxvaultcertificates/status
      - knxvaultcertificaterequests
      - knxvaultcertificaterequests/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: knxvault-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: knxvault-operator
subjects:
  - kind: ServiceAccount
    name: knxvault-operator
    namespace: knxvault
---
# W86-19: leader election leases namespaced (not cluster-wide).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: knxvault-operator-leader
  namespace: knxvault
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: knxvault-operator-leader
  namespace: knxvault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: knxvault-operator-leader
subjects:
  - kind: ServiceAccount
    name: knxvault-operator
    namespace: knxvault
---
# W86-01 + tech review H1: cannot get OR update custody Secret "knxvault".
# create is unrestricted so new TLS Secrets can be born; update/patch/get limited
# to known TLS/ACME resourceNames (extend list for Certificate.secretName values
# in this namespace). Prefer app-namespace Roles for TLS delivery.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: knxvault-operator-secrets
  namespace: knxvault
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "update", "patch"]
    resourceNames:
      - knxvault-tls-example
      - acme-account
      - acme-account-key
      - letsencrypt-account
      - app-tls
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: knxvault-operator-secrets
  namespace: knxvault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: knxvault-operator-secrets
subjects:
  - kind: ServiceAccount
    name: knxvault-operator
    namespace: knxvault
