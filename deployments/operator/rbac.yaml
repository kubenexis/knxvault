apiVersion: v1
kind: ServiceAccount
metadata:
  name: knxvault-operator
  namespace: knxvault
---
# Cluster-scoped CRDs + leader election + optional namespaced Secret write.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: knxvault-operator
rules:
  - apiGroups: [knxvault.kubenexis.dev]
    resources:
      - knxvaultcas
      - knxvaultcas/status
      - knxvaultissuers
      - knxvaultissuers/status
      - knxvaultclusterissuers
      - knxvaultclusterissuers/status
      - knxvaultcertificates
      - knxvaultcertificates/status
      - knxvaultcertificaterequests
      - knxvaultcertificaterequests/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  # W50-09: Gateway API shim (optional CRDs)
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # NOTE (W50-09): cluster-wide secrets CRUD is powerful. Prefer
  # rbac-namespaced-example.yaml per app namespace in multi-tenant installs.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: knxvault-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: knxvault-operator
subjects:
  - kind: ServiceAccount
    name: knxvault-operator
    namespace: knxvault
