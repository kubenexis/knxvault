apiVersion: v1
kind: ServiceAccount
metadata:
  name: knxvault-operator
  namespace: knxvault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: knxvault-operator
rules:
  - apiGroups: [knxvault.kubenexis.dev]
    resources:
      - knxvaultcas
      - knxvaultcas/status
      - knxvaultissuers
      - knxvaultissuers/status
      - knxvaultclusterissuers
      - knxvaultclusterissuers/status
      - knxvaultcertificates
      - knxvaultcertificates/status
      - knxvaultcertificaterequests
      - knxvaultcertificaterequests/status
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: knxvault-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: knxvault-operator
subjects:
  - kind: ServiceAccount
    name: knxvault-operator
    namespace: knxvault
