# Example sidecar injection pattern (W18).
# The sidecar calls POST /inject/render and writes files into a shared emptyDir volume.
apiVersion: v1
kind: Pod
metadata:
  name: app-with-knxvault-sidecar
  namespace: knxvault
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "ls -la /vault/secrets && sleep 3600"]
      volumeMounts:
        - name: vault-secrets
          mountPath: /vault/secrets
          readOnly: true
    - name: knxvault-agent
      image: curlimages/curl:8.5.0
      env:
        - name: KNXVAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: knxvault
              key: KNXVAULT_ROOT_TOKEN
      command:
        - sh
        - -c
        - |
          curl -sf -X POST http://knxvault:8200/inject/render \
            -H "Authorization: Bearer ${KNXVAULT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"secrets":[{"path":"app/db","file_name":"db.env"}],"format":"files"}' \
            | sed -n 's/.*"content":"\([^"]*\)".*/\1/p' > /vault/secrets/db.env
          chmod 400 /vault/secrets/db.env
          sleep 3600
      volumeMounts:
        - name: vault-secrets
          mountPath: /vault/secrets
  volumes:
    - name: vault-secrets
      emptyDir:
        medium: Memory