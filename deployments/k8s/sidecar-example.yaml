# Example sidecar injection pattern (W18 / W52).
# Prefer a short-lived scoped token (or K8s auth), NEVER the bootstrap root token.
apiVersion: v1
kind: Pod
metadata:
  name: app-with-knxvault-sidecar
  namespace: knxvault
spec:
  serviceAccountName: app-reader
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "ls -la /vault/secrets && sleep 3600"]
      volumeMounts:
        - name: vault-secrets
          mountPath: /vault/secrets
          readOnly: true
    - name: knxvault-agent
      image: curlimages/curl:8.5.0
      env:
        # Mount a scoped client token Secret (policies: secrets/kv/app/* read only).
        - name: KNXVAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: app-knxvault-token
              key: token
        - name: KNXVAULT_ADDR
          value: "https://knxvault.knxvault.svc:8200"
      command:
        - sh
        - -c
        - |
          curl -sf -X POST "${KNXVAULT_ADDR}/inject/render" \
            -H "Authorization: Bearer ${KNXVAULT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"secrets":[{"path":"app/db","file_name":"db.env"}],"format":"files"}' \
            | sed -n 's/.*"content":"\([^"]*\)".*/\1/p' > /vault/secrets/db.env
          chmod 400 /vault/secrets/db.env
          sleep 3600
      volumeMounts:
        - name: vault-secrets
          mountPath: /vault/secrets
  volumes:
    - name: vault-secrets
      emptyDir:
        medium: Memory
