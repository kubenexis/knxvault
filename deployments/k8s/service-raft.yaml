apiVersion: v1
kind: Service
metadata:
  name: knxvault-raft
  namespace: knxvault
  labels:
    app.kubernetes.io/name: knxvault
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: knxvault
  ports:
    - name: raft
      port: 63001
      targetPort: raft