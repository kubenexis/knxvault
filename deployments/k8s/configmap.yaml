apiVersion: v1
kind: ConfigMap
metadata:
  name: knxvault
  namespace: knxvault
  labels:
    app.kubernetes.io/name: knxvault
data:
  KNXVAULT_HTTP_ADDR: ":8200"
  KNXVAULT_LOG_LEVEL: "info"
  KNXVAULT_RAFT_ENABLED: "true"
  KNXVAULT_RAFT_DATA_DIR: "/var/lib/knxvault/raft"
  KNXVAULT_RAFT_INITIAL_MEMBERS: "1=knxvault-0.knxvault-raft.knxvault.svc.cluster.local:63001,2=knxvault-1.knxvault-raft.knxvault.svc.cluster.local:63001,3=knxvault-2.knxvault-raft.knxvault.svc.cluster.local:63001"
  KNXVAULT_RAFT_ELECTION_RTT: "10"
  KNXVAULT_RAFT_HEARTBEAT_RTT: "1"
  KNXVAULT_JOB_LEASE_CLEANUP_INTERVAL: "1m"
  KNXVAULT_JOB_CRL_REFRESH_INTERVAL: "15m"
  KNXVAULT_JOB_CERT_RENEW_INTERVAL: "1h"
  KNXVAULT_RENEW_GRACE: "72h"
  KNXVAULT_RATE_LIMIT_ENABLED: "true"
  KNXVAULT_RATE_LIMIT_RPM: "300"