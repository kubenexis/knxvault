apiVersion: v1
kind: ConfigMap
metadata:
  name: knxvault
  namespace: knxvault
  labels:
    app.kubernetes.io/name: knxvault
data:
  KNXVAULT_HTTP_ADDR: ":8200"
  KNXVAULT_LOG_LEVEL: "info"
  KNXVAULT_AUTO_MIGRATE: "true"
  KNXVAULT_OPENSSL_BINARY: "/usr/bin/openssl"
  KNXVAULT_HA_ENABLED: "true"
  KNXVAULT_HA_NAMESPACE: "knxvault"
  KNXVAULT_HA_LEASE_NAME: "knxvault-leader"
  KNXVAULT_JOB_LEASE_CLEANUP_INTERVAL: "1m"
  KNXVAULT_JOB_CRL_REFRESH_INTERVAL: "15m"