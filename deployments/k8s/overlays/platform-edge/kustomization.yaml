# M-DTP-1 / W90-12: platform/edge instance — production base + CSI + webhook + ESO.
# Operator and ACME egress remain opt-in (add components as needed).
# Apply: kubectl apply -k deployments/k8s/overlays/platform-edge
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: knxvault
resources:
  - ../../production
components:
  - ../../components/csi
  - ../../components/webhook
  - ../../components/eso
patches:
  - path: configmap-patch.yaml
labels:
  - pairs:
      knxvault.kubenexis.dev/instance-role: platform-edge
    includeSelectors: false
