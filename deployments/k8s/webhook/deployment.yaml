# Production-oriented webhook: TLS certs required (W81-03).
# Create Secret knxvault-webhook-tls with tls.crt / tls.key, and set caBundle
# on MutatingWebhookConfiguration (see mutating-webhook.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knxvault-webhook
  namespace: knxvault
  labels:
    app.kubernetes.io/name: knxvault-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: knxvault-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: knxvault-webhook
    spec:
      containers:
        - name: webhook
          image: ghcr.io/kubenexis/knxvault:0.5.1
          command: ["/usr/local/bin/knxvault-webhook"]
          ports:
            - name: webhook
              containerPort: 9443
          env:
            - name: KNXVAULT_WEBHOOK_ADDR
              value: ":9443"
            - name: KNXVAULT_WEBHOOK_TLS_CERT_FILE
              value: /etc/knxvault/webhook/tls.crt
            - name: KNXVAULT_WEBHOOK_TLS_KEY_FILE
              value: /etc/knxvault/webhook/tls.key
          volumeMounts:
            - name: webhook-tls
              mountPath: /etc/knxvault/webhook
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: webhook-tls
          secret:
            secretName: knxvault-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: knxvault-webhook
  namespace: knxvault
spec:
  selector:
    app.kubernetes.io/name: knxvault-webhook
  ports:
    - name: webhook
      port: 9443
      targetPort: webhook
