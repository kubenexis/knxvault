# W81-03: caBundle is required for API server trust. Replace REPLACE_WITH_BASE64_CA
# with the base64-encoded CA that signed knxvault-webhook-tls (or use cert-manager
# injection annotation when available).
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: knxvault-inject
  annotations:
    # Optional: cert-manager.io/inject-ca-from: knxvault/knxvault-webhook-cert
webhooks:
  - name: inject.knxvault.dev
    admissionReviewVersions: ["v1"]
    sideEffects: None
    clientConfig:
      service:
        name: knxvault-webhook
        namespace: knxvault
        path: /mutate
        port: 9443
      caBundle: REPLACE_WITH_BASE64_CA
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
    failurePolicy: Fail
    namespaceSelector:
      matchExpressions:
        - key: knxvault.io/webhook
          operator: In
          values: ["enabled"]
