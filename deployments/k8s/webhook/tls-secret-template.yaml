# W86-13: webhook TLS material template. Replace PEMs before apply, or use cert-manager.
# After creating the Secret, set MutatingWebhookConfiguration caBundle to base64(ca.crt):
#   CA_B64=$(base64 -w0 ca.crt)
#   kubectl patch mutatingwebhookconfiguration knxvault-inject --type=json \
#     -p "[{\"op\":\"replace\",\"path\":\"/webhooks/0/clientConfig/caBundle\",\"value\":\"$CA_B64\"}]"
apiVersion: v1
kind: Secret
metadata:
  name: knxvault-webhook-tls
  namespace: knxvault
  labels:
    app.kubernetes.io/name: knxvault-webhook
type: kubernetes.io/tls
stringData:
  tls.crt: |
    REPLACE_WITH_WEBHOOK_CERT_PEM
  tls.key: |
    REPLACE_WITH_WEBHOOK_KEY_PEM
  ca.crt: |
    REPLACE_WITH_WEBHOOK_CA_PEM
