apiVersion: v1
kind: Secret
metadata:
  name: knxvault
  namespace: knxvault
  labels:
    app.kubernetes.io/name: knxvault
    # W86-01: custody material — operator SA must not get this Secret.
    knxvault.kubenexis.dev/custody: "true"
type: Opaque
stringData:
  # Envelope encryption master key — base64-encoded 32 bytes (openssl rand -base64 32)
  KNXVAULT_MASTER_KEY: "REPLACE_ME"
  # Operational unseal key — REQUIRED when Raft is enabled (StatefulSet).
  # Must be a different base64 32-byte key from KNXVAULT_MASTER_KEY.
  # Startup fails if unset or equal to master: "unseal key is required when raft is enabled"
  KNXVAULT_UNSEAL_KEY: "REPLACE_ME_DISTINCT_FROM_MASTER"
  # Bootstrap admin token for initial API access
  KNXVAULT_ROOT_TOKEN: "REPLACE_ME"
  # Optional: HMAC key for audit export integrity (REQUIRED when security.profile=production)
  KNXVAULT_AUDIT_SIGNING_KEY: "REPLACE_ME"
  # REQUIRED when security.profile=production (metrics bearer)
  KNXVAULT_METRICS_BEARER_TOKEN: "REPLACE_ME"
  # Optional auto-unseal (aes-kek): ciphertext of unseal key + KEK from KMS CSI
  # KNXVAULT_AUTO_UNSEAL: "true"
  # KNXVAULT_AUTO_UNSEAL_PROVIDER: "aes-kek"
  # KNXVAULT_AUTO_UNSEAL_CIPHERTEXT: "REPLACE_BASE64"
  # KNXVAULT_AUTO_UNSEAL_KEK: "REPLACE_BASE64_32_BYTE_KEY"
