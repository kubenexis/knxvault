# Production overlay (W75-02 / M-DTP-1): base vault + production security profile.
# Does NOT include CSI, ESO, webhook, or ACME egress — compose via components.
# Apply: kubectl apply -k deployments/k8s/production
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: knxvault
resources:
  - ../base
  - service-metrics.yaml
  - raft-mtls/secret.yaml
patches:
  - path: configmap-patch.yaml
  - path: statefulset-patch.yaml
  # Replace lab NetworkPolicy with production rules (same name).
  - path: networkpolicy-patch.yaml
labels:
  - pairs:
      knxvault.kubenexis.dev/security-profile: production
    includeSelectors: false
