apiVersion: v1
kind: ConfigMap
metadata:
  name: knxvault
  namespace: knxvault
data:
  # W75-01 / production profile (also auto-forced for multi-node Raft without RAFT_ALLOW_INSECURE)
  KNXVAULT_SECURITY_PROFILE: "production"
  # Typical in-cluster: TLS terminated at Ingress; process may listen plain HTTP on ClusterIP.
  KNXVAULT_TLS_TERMINATION: "ingress"
  KNXVAULT_RATE_LIMIT_ENABLED: "true"
  KNXVAULT_REQUIRE_HTTPS_CLIENTS: "true"
  KNXVAULT_RBAC_SYNC_FAIL_CLOSED: "true"
  # Lab flags must stay off
  KNXVAULT_K8S_AUTH_INSECURE: "false"
  KNXVAULT_RAFT_ALLOW_INSECURE: "false"
  # W75-03: dedicated metrics plane (Service knxvault-metrics)
  KNXVAULT_METRICS_ADDR: ":8201"
  # W75-04: restrict unseal to cluster private ranges + admin jump (adjust for your CNI)
  # Empty = allow all (not recommended). Example private ranges:
  KNXVAULT_UNSEAL_ALLOW_CIDRS: "10.0.0.0/16,192.168.0.0/16,172.16.0.0/16"
  KNXVAULT_K8S_TOKEN_AUDIENCES: "knxvault"
  # Soft multi-tenant off by default (ADR-0011 single trust domain)
  KNXVAULT_TENANT_MODE: "false"
