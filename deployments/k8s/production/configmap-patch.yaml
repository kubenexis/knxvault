apiVersion: v1
kind: ConfigMap
metadata:
  name: knxvault
  namespace: knxvault
data:
  # W75-01 / production profile (also auto-forced for multi-node Raft without RAFT_ALLOW_INSECURE)
  KNXVAULT_SECURITY_PROFILE: "production"
  # Typical in-cluster: TLS terminated at Ingress; process may listen plain HTTP on ClusterIP.
  KNXVAULT_TLS_TERMINATION: "ingress"
  KNXVAULT_RATE_LIMIT_ENABLED: "true"
  KNXVAULT_REQUIRE_HTTPS_CLIENTS: "true"
  KNXVAULT_RBAC_SYNC_FAIL_CLOSED: "true"
  # Lab flags must stay off
  KNXVAULT_K8S_AUTH_INSECURE: "false"
  KNXVAULT_RAFT_ALLOW_INSECURE: "false"
  # W75-03: dedicated metrics plane (Service knxvault-metrics)
  KNXVAULT_METRICS_ADDR: ":8201"
  # W75-04 / W86-09 / tech review: prefer admin jump /32 only (not pod /24 — api-client pods must not unseal).
  # Adjust for your jump host. Empty = allow all (lab only; production profile requires non-empty).
  KNXVAULT_UNSEAL_ALLOW_CIDRS: "10.0.0.10/32"
  KNXVAULT_K8S_TOKEN_AUDIENCES: "knxvault"
  # Soft multi-tenant off by default (ADR-0011 single trust domain)
  KNXVAULT_TENANT_MODE: "false"
  # M-DTP-2 / W90-23: fail-closed feature gates on production base
  KNXVAULT_AUTH_OIDC_ENABLED: "false"
  KNXVAULT_AUTH_LDAP_ENABLED: "false"
  KNXVAULT_AUDIT_FORWARD_ENABLED: "false"
  KNXVAULT_ACME_RELATED_ENABLED: "false"
  # W86-12: do not trust client X-KNX-Environment / X-KNX-Cluster
  KNXVAULT_TRUST_CLIENT_ABAC_HEADERS: "false"
  # Optional server-side ABAC attributes (not client-asserted):
  # KNXVAULT_ABAC_ENVIRONMENT: "prod"
  # KNXVAULT_ABAC_CLUSTER: "core"
  # W86-10: configure Valkey for cluster-wide login/unseal rate limits
  # KNXVAULT_VALKEY_CACHE_URL: "rediss://valkey:6379/0"
  # W86-11: optional request signing (required=true when key set under production)
  # KNXVAULT_REQUEST_SIGNING_KEY: "from-secret"
  # W86-06: Raft peer mTLS paths (mounted from knxvault-raft-tls Secret)
  KNXVAULT_RAFT_MTLS_CERT: "/etc/knxvault/raft-tls/tls.crt"
  KNXVAULT_RAFT_MTLS_KEY: "/etc/knxvault/raft-tls/tls.key"
  KNXVAULT_RAFT_MTLS_CA: "/etc/knxvault/raft-tls/ca.crt"
