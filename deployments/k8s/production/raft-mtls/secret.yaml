# W86-06: Raft peer mTLS materials. Replace placeholders before multi-node production apply.
# Generate a private CA and per-node certs (or one shared peer identity for lab) and
# kubectl create secret generic knxvault-raft-tls -n knxvault \
#   --from-file=tls.crt=peer.crt --from-file=tls.key=peer.key --from-file=ca.crt=ca.crt
#
# This manifest is a template with empty data so kustomize includes the object name;
# operators must replace stringData before real HA bootstrap (or apply secret separately).
apiVersion: v1
kind: Secret
metadata:
  name: knxvault-raft-tls
  namespace: knxvault
  labels:
    app.kubernetes.io/name: knxvault
    knxvault.kubenexis.dev/raft-mtls: "true"
type: Opaque
stringData:
  tls.crt: |
    REPLACE_WITH_PEER_CERT_PEM
  tls.key: |
    REPLACE_WITH_PEER_KEY_PEM
  ca.crt: |
    REPLACE_WITH_RAFT_CA_PEM
