# Production NetworkPolicy (W75-02 / W86-07): default-deny ingress, explicit allows only.
# Monitoring scrapes metrics :8201 only — never API :8200 (unseal co-resides).
# Strategic merge patch replaces lab base NetworkPolicy named knxvault.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: knxvault
  namespace: knxvault
  labels:
    app.kubernetes.io/name: knxvault
    knxvault.kubenexis.dev/security-profile: production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: knxvault
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # API clients via ingress controller (path-route carefully; avoid exposing /sys/unseal publicly).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8200
    # Optional in-cluster API consumers (operator, CSI, ESO) in knxvault or labeled ns.
    - from:
        - namespaceSelector:
            matchLabels:
              knxvault.kubenexis.dev/api-client: "true"
      ports:
        - protocol: TCP
          port: 8200
    # Prometheus scrape on dedicated metrics port only (W86-07).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8201
    # Admin / break-glass unseal from a dedicated jump namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              knxvault.kubenexis.dev/unseal-client: "true"
      ports:
        - protocol: TCP
          port: 8200
    # Raft peers only
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: knxvault
      ports:
        - protocol: TCP
          port: 63001
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: knxvault
      ports:
        - protocol: TCP
          port: 63001
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
      ports:
        - protocol: TCP
          port: 443
