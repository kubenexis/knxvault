# W50-06: allow knxvault server to call TokenReview for Kubernetes auth.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: knxvault-tokenreview
  labels:
    app.kubernetes.io/name: knxvault
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: knxvault-tokenreview
  labels:
    app.kubernetes.io/name: knxvault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: knxvault-tokenreview
subjects:
  - kind: ServiceAccount
    name: knxvault
    namespace: knxvault
