# Reference SecretProviderClass for KNXVault CSI provider (W39-03).
# Requires: secrets-store-csi-driver + knxvault-csi provider (W39-01).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: knxvault-app-db
  namespace: default
spec:
  provider: knxvault
  # Enable rotation polling on the Secrets Store CSI driver (Helm: enableSecretRotation=true).
  # rotationPollInterval: 2m
  parameters:
    vaultAddr: "https://knxvault.knxvault.svc.cluster.local:8200"
    role: app-sa
    objects: |
      - path: app/db
        fileName: db.env
        objectType: secret
  # Optional: sync mounted file to a native Secret for envFrom (W39-06).
  # Warning: duplicates secret material in etcd.
  secretObjects:
    - secretName: app-db-synced
      type: Opaque
      data:
        - objectName: db.env
          key: db.env