# External Secrets integration via knxvault-eso webhook adapter (W40-01 / W86-04/05).
# Deploy knxvault-eso first: deployments/external-secrets/knxvault-eso-deployment.yaml
# Requires External Secrets Operator: https://external-secrets.io/
#
# W86-05: ESO must present a vault token (or explicit SA path). Header secret
# knxvault-eso-caller holds a scoped token for path reads only — never root.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: knxvault-webhook
spec:
  provider:
    webhook:
      url: "https://knxvault-eso.knxvault.svc.cluster.local:8443/fetch"
      headers:
        Content-Type: application/json
        # Per-request identity (W86-05) — create Secret with key token
        Authorization: "Bearer {{ .secrets.token }}"
      secrets:
        - name: token
          secretRef:
            name: knxvault-eso-caller
            namespace: knxvault
            key: token
      body: |
        {
          "path": "{{ .remoteRef.key }}",
          "property": "{{ .remoteRef.property }}",
          "role": "eso-reader"
        }
      result:
        jsonPath: "$.data"
