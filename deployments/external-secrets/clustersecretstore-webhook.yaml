# External Secrets integration via knxvault-eso webhook adapter (W40-01).
# Deploy knxvault-eso first: deployments/external-secrets/knxvault-eso-deployment.yaml
# Requires External Secrets Operator: https://external-secrets.io/
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: knxvault-webhook
spec:
  provider:
    webhook:
      url: "http://knxvault-eso.knxvault.svc.cluster.local:8080/fetch"
      headers:
        Content-Type: application/json
      body: |
        {
          "path": "{{ .remoteRef.key }}",
          "property": "{{ .remoteRef.property }}",
          "role": "eso-reader"
        }
      result:
        jsonPath: "$.data"