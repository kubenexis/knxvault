# Interim External Secrets integration via ESO Webhook provider (until W40-01 native provider).
# Requires External Secrets Operator: https://external-secrets.io/
#
# Replace WEBHOOK_URL with a small adapter or future knxvault-eso sidecar that maps
# ESO requests to KNXVault GET /secrets/kv/:path using Kubernetes auth.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: knxvault-webhook
spec:
  provider:
    webhook:
      url: "http://knxvault-eso-adapter.knxvault.svc.cluster.local:8080/fetch"
      headers:
        Content-Type: application/json
      body: |
        {
          "path": "{{ .remoteRef.key }}",
          "property": "{{ .remoteRef.property }}",
          "role": "eso-reader"
        }
      result:
        jsonPath: "$.data"