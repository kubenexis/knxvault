# Example ExternalSecret syncing a KNXVault KV path to a Kubernetes Secret.
# Use native knxvault provider (W40-01) when available; webhook store above is interim.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-db
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: knxvault-webhook
    kind: ClusterSecretStore
  target:
    name: app-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: app/db
        property: password