# ESO adapter (DTP add-on). TLS listen + caller identity required (W86-04 / W86-05).
# Create Secret knxvault-eso-tls with tls.crt / tls.key before apply.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: knxvault-eso
  namespace: knxvault
  labels:
    knxvault.kubenexis.dev/api-client: "true"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: knxvault-eso
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: knxvault-eso
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: knxvault-eso
subjects:
  - kind: ServiceAccount
    name: knxvault-eso
    namespace: knxvault
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knxvault-eso
  namespace: knxvault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knxvault-eso
  template:
    metadata:
      labels:
        app: knxvault-eso
        knxvault.kubenexis.dev/api-client: "true"
    spec:
      serviceAccountName: knxvault-eso
      containers:
        - name: knxvault-eso
          image: ghcr.io/kubenexis/knxvault:0.5.1
          command: ["/usr/local/bin/knxvault-eso"]
          env:
            - name: KNXVAULT_ESO_ADDR
              value: ":8443"
            - name: KNXVAULT_ADDR
              value: "https://knxvault.knxvault.svc.cluster.local:8200"
            - name: KNXVAULT_ESO_ROLE
              value: "eso-reader"
            # W86-04: TLS required (do not set ALLOW_PLAINTEXT in production)
            - name: KNXVAULT_ESO_TLS_CERT_FILE
              value: /etc/knxvault/eso-tls/tls.crt
            - name: KNXVAULT_ESO_TLS_KEY_FILE
              value: /etc/knxvault/eso-tls/tls.key
            # W86-05: no silent TokenFile proxy; ESO must send bearer/header token
            - name: KNXVAULT_ESO_ALLOW_TOKEN_FILE_PROXY
              value: "false"
            - name: KNXVAULT_ESO_ALLOW_INSECURE_SA_AUTH
              value: "false"
          ports:
            - containerPort: 8443
              name: https
          volumeMounts:
            - name: eso-tls
              mountPath: /etc/knxvault/eso-tls
              readOnly: true
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: eso-tls
          secret:
            secretName: knxvault-eso-tls
---
apiVersion: v1
kind: Service
metadata:
  name: knxvault-eso
  namespace: knxvault
spec:
  selector:
    app: knxvault-eso
  ports:
    - name: https
      port: 8443
      targetPort: https
