# Native KNXVault integration for External Secrets Operator via knxvault-eso adapter (W40-01).
# Install External Secrets Operator, knxvault-eso deployment, then apply this store.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: knxvault
spec:
  provider:
    webhook:
      url: "http://knxvault-eso.knxvault.svc.cluster.local:8080/fetch"
      headers:
        Content-Type: application/json
      body: |
        {
          "path": "{{ .remoteRef.key }}",
          "property": "{{ .remoteRef.property }}",
          "role": "eso-reader"
        }
      result:
        jsonPath: "$.data"