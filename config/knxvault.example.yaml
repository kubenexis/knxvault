# KNXVault base configuration (YAML v3).
# Environment variables override these values at runtime.

http_addr: ":8200"
log_level: info
shutdown_grace: 10s

# PKI always uses in-process Go crypto/x509 (native). There is no OpenSSL CLI
# backend — production images are distroless and do not ship openssl.

# jwt_secret: dev-only HS256 K8s login
# root_token: bootstrap admin token
token_ttl: 24h
k8s_auth_insecure: false

ha:
  enabled: false
  namespace: knxvault
  lease_name: knxvault-leader
  # identity: knxvault-0

jobs:
  lease_cleanup_interval: 1m
  crl_refresh_interval: 15m
  cert_renew_interval: 1h
  kv_rotation_interval: 5m
  renew_grace: 72h

audit:
  # signing_key: ""
  # forward_url: ""

security:
  # profile: lab          # default — lab/dev; use production for fail-closed posture
  # profile: production   # see config/knxvault.production.yaml and docs/design/production-security-posture.md
  # tls_termination: server   # or ingress (edge TLS; production allows plain listen)
  rate_limit_enabled: true
  rate_limit_rpm: 300
  request_signing_required: false
  cors_allowed_origins: []
  # metrics_bearer_token: ""  # required when profile=production (or KNXVAULT_METRICS_BEARER_TOKEN)
  # tls_cert: /etc/knxvault/tls/server.pem
  # tls_key: /etc/knxvault/tls/server.key
  # mtls_required: false
